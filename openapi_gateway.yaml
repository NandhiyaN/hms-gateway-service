openapi: 3.0.3
info:
  title: HMS API Gateway
  version: 1.0.0
  description: Central API Gateway for routing, authentication, and aggregation

servers:
  - url: http://localhost:9000

paths:

  /health:
    get:
      summary: Health Check
      responses:
        "200":
          description: Gateway is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string

  /api/v1/auth/login:
    post:
      summary: Login (Mock Auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: admin_test
                  token_type:
                    type: string
                    example: bearer
                  role:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      summary: Get current user role
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user role
          content:
            application/json:
              schema:
                type: object
                properties:
                  role:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/appointments/{appointment_id}:
    get:
      summary: Get composed appointment (appointment + patient + doctor)
      security:
        - BearerAuth: []
      parameters:
        - name: appointment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Aggregated appointment data
          content:
            application/json:
              schema:
                type: object
                properties:
                  appointment:
                    type: object
                  patient:
                    type: object
                  doctor:
                    type: object
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/bills/generate-from-appointment/{id}:
    post:
      summary: Proxy - Generate bill
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bill generated
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/bills/handle-cancellation/{id}:
    post:
      summary: Proxy - Handle cancellation billing
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [penalty]
              properties:
                penalty:
                  type: number
                  minimum: 0
                  maximum: 1
      responses:
        "200":
          description: Cancellation handled
          content:
            application/json:
              schema:
                type: object

  /api/v1/{service_name}/{path}:
    get:
      summary: Generic proxy (GET)
      security:
        - BearerAuth: []
      parameters:
        - name: service_name
          in: path
          required: true
          schema:
            type: string
            example: doctors
        - name: path
          in: path
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Proxied response

    post:
      summary: Generic proxy (POST)
      security:
        - BearerAuth: []
      parameters:
        - name: service_name
          in: path
          required: true
          schema:
            type: string
        - name: path
          in: path
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Proxied response

    put:
      summary: Generic proxy (PUT)
      security:
        - BearerAuth: []
      parameters:
        - name: service_name
          in: path
          required: true
          schema:
            type: string
        - name: path
          in: path
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Proxied response

    delete:
      summary: Generic proxy (DELETE)
      security:
        - BearerAuth: []
      parameters:
        - name: service_name
          in: path
          required: true
          schema:
            type: string
        - name: path
          in: path
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Proxied response

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        correlationId:
          type: string
        details:
          type: array
          items:
            type: object

  responses:

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Conflict error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"